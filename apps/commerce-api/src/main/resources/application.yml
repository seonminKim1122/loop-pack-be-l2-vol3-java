server:
  shutdown: graceful
  tomcat:
    threads:
      max: 200 # 최대 워커 스레드 수 (default : 200)
      min-spare: 10 # 최소 유지 스레드 수 (default : 10)
    connection-timeout: 1m # 연결 타임아웃 (ms) (default : 60000ms = 1m)
    max-connections: 8192 # 최대 동시 연결 수 (default : 8192)
    accept-count: 100 # 대기 큐 크기 (default : 100)
    keep-alive-timeout: 60s # 60s
  max-http-request-header-size: 8KB

spring:
  main:
    web-application-type: servlet
  application:
    name: commerce-api
  profiles:
    active: local
  config:
    import:
      - jpa.yml
      - redis.yml
      - logging.yml
      - monitoring.yml

springdoc:
  use-fqn: true
  swagger-ui:
    path: /swagger-ui.html

resilience4j:
  circuitbreaker:
    circuitBreakerAspectOrder: 1  # outer — CB(outer) → Retry(inner)
    instances:
      pg:
        sliding-window-type: COUNT_BASED
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50        # 5회 중 50% 실패 시 open
        wait-duration-in-open-state: 10s  # 10초 후 half-open
        permitted-number-of-calls-in-half-open-state: 3
        ignore-exceptions:
          - com.loopers.support.error.CoreException  # read timeout(BAD_GATEWAY), 400(BAD_REQUEST) bypass
  retry:
    retryAspectOrder: 2  # inner
    instances:
      pg:
        max-attempts: 3
        wait-duration: 500ms
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 2s
        retry-exceptions:
          - org.springframework.web.client.HttpServerErrorException
          - org.springframework.web.client.ResourceAccessException
        ignore-exceptions:
          - com.loopers.support.error.CoreException

---
spring:
  config:
    activate:
      on-profile: local, test

payment:
  pg:
    callback-url: http://localhost:8080/api/v1/payments/callback
    base-url: http://localhost:8082
    merchant-id: loopers
  reconciliation:
    interval-ms: 30000
    pending-threshold-seconds: 30

---
spring:
  config:
    activate:
      on-profile: dev

---
spring:
  config:
    activate:
      on-profile: qa

---
spring:
  config:
    activate:
      on-profile: prd

springdoc:
  api-docs:
    enabled: false